<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation (same as index.html) -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html">🛍️ ShopEase</a>
            </div>
            
            <div class="nav-search">
                <input type="text" placeholder="Search products..." id="searchInput">
                <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="nav-menu">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Products</a>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Products Section -->
    <section class="featured-products" style="margin-top: 2rem;">
        <div class="products-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 class="section-title" style="margin-bottom: 0;">All Products</h2>
            
            <div style="display: flex; gap: 1rem;">
                <select id="categoryFilter" style="padding: 0.5rem; border: 2px solid #ddd; border-radius: 5px;">
                    <option value="all">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Living</option>
                    <option value="books">Books</option>
                </select>
                
                <select id="priceFilter" style="padding: 0.5rem; border: 2px solid #ddd; border-radius: 5px;">
                    <option value="all">All Prices</option>
                    <option value="0-1000">Under Rs 1000</option>
                    <option value="1000-5000">Rs 1000 - 5000</option>
                    <option value="5000-10000">Rs 5000 - 10000</option>
                    <option value="10000">Above Rs 10000</option>
                </select>
                
                <select id="sortFilter" style="padding: 0.5rem; border: 2px solid #ddd; border-radius: 5px;">
                    <option value="default">Sort By</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name">Name</option>
                    <option value="rating">Rating</option>
                </select>
            </div>
        </div>
        
        <div class="products-grid" id="allProducts">
            <!-- Products loaded here -->
        </div>
    </section>

    <!-- Footer (same as index.html) -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>About Us</h3>
                <p>ShopEase is your one-stop destination for all your shopping needs.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <a href="products.html">Products</a>
                <a href="#">Contact</a>
                <a href="#">FAQ</a>
                <a href="#">Terms & Conditions</a>
            </div>
            <div class="footer-section">
                <h3>Contact Info</h3>
                <p><i class="fas fa-phone"></i> +92 300 1234567</p>
                <p><i class="fas fa-envelope"></i> info@shopease.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 ShopEase. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
